<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Z Animation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./estilos/styleIndex.css" />
    <link rel="stylesheet" href="./estilos/styleRegistrar.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="imagenes/letra-z.png"
    />
  </head>
  <body>
    <!-- Sección de Registro -->
    <section class="registro-section">
      <div class="header-registro">
        <h1 class="registro-titulo-main" id="reg-titulo-hola">¡Hola!</h1>
        <p class="registro-subtitle-main" id="reg-subtitle-alegra">
          Nos alegra tenerte aquí
        </p>
      </div>

      <div class="registro-form-container">
        <div class="registro-card">
          <form id="registroFormulario">
            <!-- Usuario -->
            <div class="form-group">
              <label
                for="reg-usuario"
                class="form-label-registro"
                data-i18n="reg-label-usuario"
                >Usuario</label
              >
              <input
                type="text"
                class="form-input-registro"
                id="reg-usuario"
                data-placeholder-id="reg-usuario-placeholder"
                placeholder="Tu nombre de usuario"
                required
              />
            </div>

            <!-- Email -->
            <div class="form-group">
              <label
                for="reg-email"
                class="form-label-registro"
                data-i18n="reg-label-email"
                >Email</label
              >
              <input
                type="email"
                class="form-input-registro"
                id="reg-email"
                data-placeholder-id="reg-email-placeholder"
                placeholder="tu@email.com"
                required
              />
            </div>

            <!-- Contraseña -->
            <div class="form-group">
              <label
                for="reg-pass"
                class="form-label-registro"
                data-i18n="reg-label-pass"
                >Contraseña</label
              >
              <input
                type="password"
                class="form-input-registro"
                id="reg-pass"
                data-placeholder-id="reg-pass-placeholder"
                placeholder="Mínimo 8 caracteres"
                required
              />
            </div>

            <!-- Confirmar Contraseña -->
            <div class="form-group">
              <label
                for="reg-pass-confirm"
                class="form-label-registro"
                data-i18n="reg-label-pass-confirm"
                >Confirmar Contraseña</label
              >
              <input
                type="password"
                class="form-input-registro"
                id="reg-pass-confirm"
                data-placeholder-id="reg-pass-confirm-placeholder"
                placeholder="Repite tu contraseña"
                required
              />
            </div>

            <!-- Botón Crear Cuenta -->
            <button type="submit" class="btn-registro" id="reg-btn-crear">
              Crear Cuenta
            </button>
          </form>

          <!-- Link a Login -->
          <div class="link-login">
            <span data-i18n="reg-link-signin">¿Ya tienes cuenta?</span>
            <a href="#login" data-i18n="reg-link-signin-btn"
              >Inicia sesión aquí</a
            >
          </div>
        </div>
      </div>
    </section>

    <script src="./js/language.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para efectos de inputs -->
    <script>
      // Validación en tiempo real de contraseñas
      const passInput = document.getElementById("reg-pass");
      const passConfirm = document.getElementById("reg-pass-confirm");

      passInput.addEventListener("input", () => {
        if (passInput.value.length > 0) {
          passInput.classList.add("filled");
        } else {
          passInput.classList.remove("filled");
        }
      });

      passConfirm.addEventListener("input", () => {
        if (passConfirm.value.length > 0) {
          passConfirm.classList.add("filled");
        } else {
          passConfirm.classList.remove("filled");
        }
      });

      // Validación del formulario
      document
        .getElementById("registroFormulario")
        .addEventListener("submit", (e) => {
          const pass = document.getElementById("reg-pass").value;
          const passConfirm = document.getElementById("reg-pass-confirm").value;

          if (pass !== passConfirm) {
            e.preventDefault();
            alert("Las contraseñas no coinciden");
            return;
          }

          if (pass.length < 8) {
            e.preventDefault();
            alert("La contraseña debe tener mínimo 8 caracteres");
            return;
          }

          console.log("Formulario válido, datos listos para enviar");
        });

      // Efectos en inputs
      const inputs = document.querySelectorAll(".form-input-registro");
      inputs.forEach((input) => {
        input.addEventListener("focus", function () {
          this.parentElement.style.transform = "translateY(-2px)";
        });

        input.addEventListener("blur", function () {
          this.parentElement.style.transform = "translateY(0)";
        });

        if (input.value.length > 0) {
          input.classList.add("filled");
        }
      });
    </script>
  </body>
</html>
